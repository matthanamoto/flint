<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#141420"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background squircle -->
  <rect width="1024" height="1024" rx="210" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect width="1024" height="1024" rx="210" fill="none"
        stroke="#06b6d4" stroke-width="2.5" opacity="0.12"/>

  <!-- Subtle grid lines — background texture -->
  <g opacity="0.04" stroke="#06b6d4" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- > chevron — prompt caret -->
  <path d="M 252 348 L 462 512 L 252 676"
        stroke="#06b6d4" stroke-width="64"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none" filter="url(#glow)"/>

  <!-- _ cursor -->
  <line x1="506" y1="666" x2="772" y2="666"
        stroke="#06b6d4" stroke-width="58"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- Sparkle ✦ top-right -->
  <g transform="translate(790, 214)" filter="url(#softglow)">
    <path d="M0,-36 L6,-6 L36,0 L6,6 L0,36 L-6,6 L-36,0 L-6,-6 Z"
          fill="#06b6d4" opacity="0.75"/>
  </g>

  <!-- Smaller sparkle -->
  <g transform="translate(842, 288)">
    <path d="M0,-16 L2.6,-2.6 L16,0 L2.6,2.6 L0,16 L-2.6,2.6 L-16,0 L-2.6,-2.6 Z"
          fill="#06b6d4" opacity="0.35"/>
  </g>
</svg>
